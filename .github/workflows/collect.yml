name: Traffic Data Collector

on:
  schedule:
    - cron: '*/10 * * * *'   # alle 10 Minuten
  workflow_dispatch:           # manueller Start zum Testen

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # Schreibrecht für CSV-Commit

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Skript ausführen
        env:
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
        run: python collect.py

      - name: CSV committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic_log.csv
          git diff --staged --quiet || git commit -m "Traffic data $(date -u '+%Y-%m-%d %H:%M')"
          git push
